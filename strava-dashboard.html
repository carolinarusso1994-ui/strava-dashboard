<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carol · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300;1,9..144,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1612;--bg2:#211d18;--surface:#2a2420;--surface2:#332d27;--border:#3d3530;--border2:#4a4238;
  --text:#f0e8dc;--text2:#c4b8a8;--muted:#8a7d6e;--muted2:#5a5048;
  --terra:#c4622d;--terra-l:#3d2518;--sage:#5a7a4a;--sage-l:#1e2d18;--dusk:#b87040;--dusk-l:#3a2510;--sky:#4a6a8a;--sky-l:#1a2a38;--rose:#c4506a;--rose-l:#3a1820;
  --men:#e05050;--men-l:#3a1818;--fol:#5a8a50;--fol-l:#1a2e18;--ovu:#d07030;--ovu-l:#3a2510;--lut:#7a5aaa;--lut-l:#281a3a;
  --z1c:#60a5fa;--z2c:#34d399;--z3c:#fbbf24;--z4c:#f97316;--z5c:#ef4444;
  --radius:12px;--radius-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

/* AUTH */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:1}
#auth-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 60%,rgba(196,98,45,.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(90,122,74,.1) 0%,transparent 50%);pointer-events:none}
.auth-wrap{max-width:420px;width:100%;position:relative;z-index:1}
.auth-brand{text-align:center;margin-bottom:2rem}
.auth-brand-name{font-family:'Fraunces',serif;font-size:2.5rem;font-weight:300;color:var(--text);letter-spacing:-.02em;line-height:1}
.auth-brand-name em{font-style:italic;color:var(--dusk)}
.auth-brand-sub{font-size:.8rem;color:var(--muted);margin-top:.4rem;letter-spacing:.08em;text-transform:uppercase}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem}
.auth-card h2{font-size:.9rem;font-weight:500;color:var(--text2);margin-bottom:.3rem}
.auth-card p{font-size:.8rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}
.field{margin-bottom:.75rem}
.field label{display:block;font-size:.65rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem}
.field input{width:100%;padding:.7rem .95rem;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.9rem;background:var(--bg2);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--terra)}
.btn-strava{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;padding:.85rem;background:var(--terra);color:#fff;border:none;border-radius:var(--radius-sm);font-size:.9rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:1.25rem;transition:opacity .15s}
.btn-strava:hover{opacity:.85}
.btn-strava svg{width:16px;height:16px;flex-shrink:0}
.auth-note{font-size:.68rem;color:var(--muted2);text-align:center;margin-top:.75rem;line-height:1.6}

/* LOADING */
#loading-screen{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:1.25rem;text-align:center;padding:2rem;position:relative;z-index:1}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--terra);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load-msg{font-size:.8rem;color:var(--muted)}

/* SHELL */
#app{display:none;position:relative;z-index:1}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;backdrop-filter:blur(12px)}
.hbrand{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:300;letter-spacing:-.01em}
.hbrand em{font-style:italic;color:var(--dusk)}
.hright{display:flex;align-items:center;gap:.75rem}
.havatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border2)}
.hday{font-size:.72rem;color:var(--muted);padding:.2rem .65rem;background:var(--surface);border:1px solid var(--border);border-radius:100px}
.hbtn{font-size:.68rem;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:.22rem .6rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.hbtn:hover{color:var(--rose);border-color:var(--rose)}
nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 2rem;overflow-x:auto;position:sticky;top:56px;z-index:190}
.tab{font-size:.72rem;font-weight:400;letter-spacing:.05em;text-transform:uppercase;padding:.65rem 1rem;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;margin-bottom:-1px}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--terra);border-bottom-color:var(--terra);font-weight:500}
main{padding:1.75rem 2rem;max-width:1300px;margin:0 auto}
.section{display:none}
.section.active{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* LAYOUT */
.grid{display:grid;gap:.85rem}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.g21{grid-template-columns:2fr 1fr}
.g12{grid-template-columns:1fr 2fr}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g21,.g12{grid-template-columns:1fr}}
@media(max-width:620px){.g4,.g3,.g2{grid-template-columns:1fr}main{padding:1rem}header,nav{padding:0 1rem}}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.3rem;overflow:hidden}
.card-accent{height:2px;margin:-1.1rem -1.3rem 1rem;border-radius:var(--radius) var(--radius) 0 0}
.ca-terra{background:var(--terra)}.ca-sage{background:var(--sage)}.ca-dusk{background:var(--dusk)}.ca-sky{background:var(--sky)}.ca-rose{background:var(--rose)}
.lbl{font-size:.62rem;font-weight:500;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem}
.big{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:300;line-height:1;color:var(--text)}
.big.sm{font-size:1.4rem}.big.xs{font-size:1.1rem}
.unit{font-size:.78rem;color:var(--muted);margin-left:.1rem}
.sub{font-size:.7rem;color:var(--muted);margin-top:.3rem;line-height:1.4}
.sec{font-family:'Fraunces',serif;font-size:.9rem;font-weight:300;font-style:italic;color:var(--muted);margin-bottom:.85rem;margin-top:1.75rem;display:flex;align-items:center;gap:.75rem}
.sec:first-child{margin-top:0}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem;padding:.75rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.flbl{font-size:.65rem;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
.fchip{padding:.28rem .7rem;border:1px solid var(--border);border-radius:100px;font-size:.72rem;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s;font-family:'DM Sans',sans-serif}
.fchip:hover{border-color:var(--terra);color:var(--terra)}
.fchip.active{background:var(--terra);border-color:var(--terra);color:#fff;font-weight:500}
.fsep{width:1px;height:16px;background:var(--border)}
.fsel{padding:.25rem .65rem;border:1px solid var(--border);border-radius:100px;font-size:.72rem;background:var(--surface);color:var(--text2);outline:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.fsel option{background:var(--surface2)}

/* ACTIVITY LIST */
.act-list{display:flex;flex-direction:column;gap:.38rem}
.act-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.75rem 1.1rem;display:grid;grid-template-columns:1.9rem 1fr repeat(4,auto);align-items:center;gap:.75rem;transition:border-color .15s}
.act-row:hover{border-color:var(--border2)}
.act-icon{width:1.9rem;height:1.9rem;background:var(--surface2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.act-name{font-size:.85rem;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.act-meta{font-size:.67rem;color:var(--muted);margin-top:.06rem}
.astat{text-align:right;min-width:58px}
.av{font-family:'Fraunces',serif;font-size:.88rem;font-weight:300;color:var(--text)}
.al{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:.13rem .48rem;border-radius:100px;font-size:.62rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.bt{background:var(--terra-l);color:#e8845a}.bs{background:var(--sage-l);color:#7ab060}.bd{background:var(--dusk-l);color:#d09060}.bk{background:var(--sky-l);color:#6a9aba}.br{background:var(--rose-l);color:#d4708a}.bm{background:var(--surface2);color:var(--muted)}

/* CHART */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.ct{font-size:.8rem;font-weight:500;color:var(--text2)}
.cs{font-size:.68rem;color:var(--muted);margin-top:.1rem;margin-bottom:.75rem}
.cwrap{position:relative;height:185px}
.cwrap.tall{height:240px}

/* INSIGHT */
.insight{background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--terra);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:.85rem 1rem;margin-bottom:.55rem}
.insight.sage{border-left-color:var(--sage)}.insight.sky{border-left-color:var(--sky)}
.it{font-size:.78rem;font-weight:500;margin-bottom:.2rem;color:var(--text2)}
.ib{font-size:.74rem;color:var(--muted);line-height:1.65}

/* ZONE BARS */
.btrack{height:4px;background:var(--surface2);border-radius:100px;overflow:hidden;margin-top:.5rem}
.bfill{height:100%;border-radius:100px}
.zrow{display:flex;align-items:center;gap:.65rem;margin-bottom:.42rem}
.zlbl{font-size:.68rem;font-weight:500;min-width:40px}
.zdesc{font-size:.63rem;color:var(--muted);min-width:95px}
.ztrack{flex:1;height:6px;background:var(--surface2);border-radius:100px;overflow:hidden}
.zfill{height:100%;border-radius:100px;transition:width 1s}
.zpct{font-size:.68rem;min-width:28px;text-align:right;color:var(--muted)}
.z1c{background:var(--z1c)}.z2c{background:var(--z2c)}.z3c{background:var(--z3c)}.z4c{background:var(--z4c)}.z5c{background:var(--z5c)}

/* REPORT */
.report-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;margin-bottom:1rem}
.rh-label{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--terra);font-weight:500;margin-bottom:.5rem}
.rh-title{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:300;line-height:1.2;margin-bottom:.25rem}
.rh-title em{font-style:italic;color:var(--dusk)}
.rh-date{font-size:.74rem;color:var(--muted);margin-bottom:1.25rem}
.rh-score{display:inline-flex;align-items:center;gap:.5rem;padding:.38rem .95rem;border-radius:100px;font-size:.8rem;font-weight:500;margin-bottom:1rem}
.report-block{margin-bottom:1.25rem}
.report-block h2{font-family:'Fraunces',serif;font-size:1rem;font-weight:300;margin-bottom:.45rem;color:var(--text2);display:flex;align-items:center;gap:.5rem}
.report-block p{font-size:.84rem;color:var(--muted);line-height:1.75}
.report-block p strong{color:var(--text);font-weight:500}

/* NUTRI REAL */
.nutri-real{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1rem}
.nr-header{background:var(--surface2);border-bottom:1px solid var(--border);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.nr-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:300;color:var(--text)}
.nr-title em{font-style:italic;color:var(--dusk)}
.nr-sync{font-size:.65rem;color:var(--muted);display:flex;align-items:center;gap:.4rem;cursor:pointer;padding:.3rem .65rem;border:1px solid var(--border);border-radius:100px;transition:all .15s}
.nr-sync:hover{border-color:var(--sage);color:var(--sage)}
.nr-dot{width:5px;height:5px;border-radius:50%;background:var(--sage);animation:pulse2 2s infinite}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.3}}
.nr-body{padding:1.1rem 1.25rem}
.nr-ring-row{display:flex;align-items:center;gap:1.25rem;margin-bottom:1.1rem}
.nr-ring{position:relative;flex-shrink:0}
.nr-ring svg{transform:rotate(-90deg)}
.nr-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.nr-kcal{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:300;color:var(--text);line-height:1}
.nr-kcal-lbl{font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.nr-cal-meta{flex:1;display:flex;flex-direction:column;gap:.35rem}
.nr-cal-row{display:flex;justify-content:space-between;align-items:center;font-size:.75rem}
.nr-cal-key{color:var(--muted)}
.nr-cal-val{font-family:'Fraunces',serif;font-weight:300;color:var(--text2)}
.nr-cal-val.pos{color:var(--sage)}.nr-cal-val.neg{color:var(--men)}.nr-cal-val.neu{color:var(--dusk)}
.nr-macros{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1rem}
.nr-macro{background:var(--surface2);border-radius:9px;padding:.65rem .75rem}
.nr-macro-lbl{font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem}
.nr-macro-val{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:300;color:var(--text);line-height:1}
.nr-macro-sub{font-size:.62rem;color:var(--muted);margin-top:.15rem}
.nr-bar{height:2px;background:var(--border);border-radius:1px;margin-top:.5rem;overflow:hidden}
.nr-bar-fill{height:100%;border-radius:1px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.nr-wellness{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.nr-chip{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .65rem;border-radius:100px;font-size:.7rem;font-weight:500;border:1px solid transparent}
.nr-chip.agua{background:rgba(74,106,138,.15);border-color:rgba(74,106,138,.3);color:#6a9aba}
.nr-chip.sueno{background:rgba(122,90,170,.15);border-color:rgba(122,90,170,.3);color:#9a70cc}
.nr-chip.energia{background:rgba(184,112,64,.15);border-color:rgba(184,112,64,.3);color:var(--dusk)}
.nr-chip.ciclo.mens{background:var(--men-l);border-color:#5a2020;color:#e87070}
.nr-chip.ciclo.foli{background:var(--fol-l);border-color:#1e4a18;color:#70c870}
.nr-chip.ciclo.ovu{background:var(--ovu-l);border-color:#5a3a10;color:#e8a060}
.nr-chip.ciclo.lute{background:var(--lut-l);border-color:#3a2858;color:#a880e0}
.nr-log{display:flex;flex-direction:column;gap:.3rem}
.nr-log-item{display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem;background:var(--surface2);border-radius:8px}
.nr-log-tag{font-size:.58rem;letter-spacing:1px;text-transform:uppercase;font-weight:600;padding:.15rem .5rem;border-radius:4px;flex-shrink:0;min-width:68px;text-align:center}
.tag-desayuno{background:rgba(184,112,64,.2);color:var(--dusk)}
.tag-almuerzo{background:rgba(74,106,138,.2);color:#6a9aba}
.tag-merienda{background:rgba(90,122,74,.2);color:#7ab060}
.tag-cena{background:rgba(122,90,170,.2);color:#9a70cc}
.tag-snack,.tag-hidratación{background:rgba(196,98,45,.12);color:#e8845a}
.nr-log-name{flex:1;font-size:.8rem;color:var(--text2);font-weight:400}
.nr-log-g{font-size:.68rem;color:var(--muted);flex-shrink:0}
.nr-log-kcal{font-size:.75rem;color:var(--dusk);font-family:'Fraunces',serif;font-weight:300;flex-shrink:0;min-width:52px;text-align:right}
.nr-log-macros{font-size:.62rem;color:var(--muted);flex-shrink:0;text-align:right;line-height:1.4;min-width:72px}
.nr-week{display:flex;align-items:flex-end;gap:4px;height:50px;margin-bottom:.4rem}
.nr-week-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.nr-week-bar{width:100%;border-radius:2px 2px 0 0;min-height:2px}
.nr-week-bar.today{background:var(--dusk)}.nr-week-bar.past{background:var(--surface2)}.nr-week-bar.over{background:rgba(224,80,80,.5)}
.nr-week-lbl{font-size:.6rem;color:var(--muted)}.nr-week-lbl.today{color:var(--dusk)}
.nr-empty{text-align:center;padding:2rem;color:var(--muted);font-size:.8rem;line-height:1.7}
.nr-loading{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:2rem;color:var(--muted);font-size:.75rem}
.nr-loading-dot{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:bounce2 .9s infinite}
.nr-loading-dot:nth-child(2){animation-delay:.15s}.nr-loading-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce2{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.nr-error{background:rgba(224,80,80,.08);border:1px solid rgba(224,80,80,.2);border-radius:8px;padding:.75rem 1rem;font-size:.75rem;color:#e87070;margin:.5rem 0}

/* NUTRI CYCLE */
.nutri-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:.85rem}
.nutri-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface2)}
.nutri-header h2{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:300;margin-bottom:.2rem}
.nutri-header h2 em{font-style:italic;color:var(--dusk)}
.nutri-header p{font-size:.75rem;color:var(--muted);line-height:1.6}
.phase-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:1rem}
@media(max-width:800px){.phase-cards{grid-template-columns:repeat(2,1fr)}}
.pc2{border-radius:var(--radius-sm);padding:.85rem 1rem;border:1px solid transparent;cursor:pointer;transition:all .2s}
.pc2.men{background:var(--men-l);border-color:#5a2020}.pc2.fol{background:var(--fol-l);border-color:#1e4a18}.pc2.ovu{background:var(--ovu-l);border-color:#5a3a10}.pc2.lut{background:var(--lut-l);border-color:#3a2858}
.pc2.selected{outline:2px solid var(--terra);outline-offset:1px}
.pc2.current::after{content:'hoy';float:right;font-size:.58rem;font-weight:600;letter-spacing:.08em;padding:.12rem .4rem;border-radius:100px;background:var(--terra);color:#fff}
.pc2-name{font-size:.8rem;font-weight:500;margin-bottom:.1rem;color:var(--text2)}
.pc2-days{font-size:.65rem;color:var(--muted)}
.pc2-energy{font-size:.68rem;font-weight:500;margin-top:.25rem}
.pc2-energy.men{color:var(--men)}.pc2-energy.fol{color:var(--fol)}.pc2-energy.ovu{color:var(--ovu)}.pc2-energy.lut{color:var(--lut)}

/* CHAT */
.chat-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.chat-hdr{padding:.9rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.7rem;background:var(--surface2)}
.chat-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--terra-l),var(--lut-l));display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}

<script>
// ══════════════════════════════════════════════════
//  NUTRITION SHEET CONFIG
//  Hoja: diario (gid=1172432642)
//  Columnas: fecha | Desayuno | Almuerzo | Merienda | Cena | Pre entreno |
//            calorías_est | proteínas_g | carbos_g | grasas_g | Calidad sueño |
//            VFC | Estrés | Fatiga | Dolor muscular | Dia ciclo | Fase ciclo | Notas sensaciones
//
//  Perfil hoja 2 (gid=0 o el que corresponda):
//  Columnas: Fecha | Nombre | Fecha de nacimiento | Altura (cm) | Peso actual (kg) |
//            IMC | % Grasa corporal | Masa muscular (kg)
// ══════════════════════════════════════════════════
const SHEET_ID = '1zrUQaq20RtGQLBFsTSwPb9VBJSsaERtjF-c3v_VRrg4';
// Para que funcione el CSV público, la planilla debe estar publicada:
// Archivo → Compartir → Publicar en la web → hoja específica → CSV
// Si no está publicada, pegá la URL de publicación en NUTRI_SHEET_URL y PERFIL_SHEET_URL
const NUTRI_SHEET_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=1172432642`;
const PERFIL_SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

const NUTRI_CONFIG = {
  SHEET_URL: NUTRI_SHEET_URL,
  metas: { kcal:2100, proteina:130, carbos:220, grasas:65 },
};
let _nutriCache = { rows:null, ts:0 };
let _perfilCache = { data:null, ts:0 };

// Parsea una línea CSV respetando comillas
function parseCSVLine(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=c;
  }
  result.push(cur.trim());
  return result;
}

async function fetchNutritionRows(force=false) {
  const now=Date.now();
  if(!force&&_nutriCache.rows&&(now-_nutriCache.ts)<5*60*1000) return _nutriCache.rows;
  const res=await fetch(NUTRI_CONFIG.SHEET_URL+'&t='+now);
  if(!res.ok) throw new Error('HTTP '+res.status+' — verificá que la planilla esté publicada como CSV');
  const text=await res.text();
  const lines=text.trim().split('\n');
  // Detectar índices por encabezado
  const headers=parseCSVLine(lines[0]).map(h=>h.toLowerCase().trim());
  const idx=(name)=>headers.findIndex(h=>h.includes(name));
  const iF=idx('fecha'),iD=idx('desayuno'),iAl=idx('almuerzo'),iMe=idx('merienda'),iCe=idx('cena'),iPre=idx('pre'),
        iKcal=idx('calor'),iProt=idx('prote'),iCarb=idx('carbo'),iGras=idx('gras'),
        iSleep=idx('sue'),iVfc=idx('vfc'),iEst=idx('estr'),iFat=idx('fati'),iDol=idx('dolor'),
        iDiaCiclo=idx('dia ciclo'),iFaseCiclo=idx('fase ciclo'),iNotas=idx('nota');
  const rows=lines.slice(1).filter(r=>r.trim()).map(r=>{
    const c=parseCSVLine(r);
    const get=(i)=>i>=0?(c[i]||'').trim():'';
    return{
      fecha:get(iF), desayuno:get(iD), almuerzo:get(iAl), merienda:get(iMe),
      cena:get(iCe), pre_entreno:get(iPre),
      kcal:parseFloat(get(iKcal))||0, proteina:parseFloat(get(iProt))||0,
      carbos:parseFloat(get(iCarb))||0, grasas:parseFloat(get(iGras))||0,
      sueno_q:parseFloat(get(iSleep))||0, vfc:parseFloat(get(iVfc))||0,
      estres:parseFloat(get(iEst))||0, fatiga:parseFloat(get(iFat))||0,
      dolor:parseFloat(get(iDol))||0,
      dia_ciclo:get(iDiaCiclo), fase_ciclo:get(iFaseCiclo), notas:get(iNotas),
    };
  });
  _nutriCache={rows,ts:now};
  return rows;
}

async function fetchPerfilRow(force=false){
  const now=Date.now();
  if(!force&&_perfilCache.data&&(now-_perfilCache.ts)<10*60*1000) return _perfilCache.data;
  try{
    const res=await fetch(PERFIL_SHEET_URL+'&t='+now);
    if(!res.ok) return null;
    const text=await res.text();
    const lines=text.trim().split('\n');
    if(lines.length<2) return null;
    const headers=parseCSVLine(lines[0]).map(h=>h.toLowerCase().trim());
    const idx=(name)=>headers.findIndex(h=>h.includes(name));
    const c=parseCSVLine(lines[1]);
    const get=(i)=>i>=0?(c[i]||'').trim():'';
    const data={
      nombre:get(idx('nombre')), nacimiento:get(idx('nacimiento')),
      altura:parseFloat(get(idx('altura')))||0, peso:parseFloat(get(idx('peso')))||0,
      imc:parseFloat(get(idx('imc')))||0, grasa:parseFloat(get(idx('grasa')))||0,
      masa_muscular:parseFloat(get(idx('muscular')))||0,
    };
    _perfilCache={data,ts:now};
    return data;
  }catch(e){return null;}
}
function todayAR(){return new Date().toLocaleDateString('es-AR',{year:'numeric',month:'2-digit',day:'2-digit'});}
function normalizeFecha(f){
  if(!f) return '';
  f=f.trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(f)){const[y,m,d]=f.split('-');return d+'/'+m+'/'+y;}
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(f)){const[d,m,y]=f.split('/');return d.padStart(2,'0')+'/'+m.padStart(2,'0')+'/'+y;}
  if(/^\d{1,2}-\d{1,2}-\d{4}$/.test(f)){const[d,m,y]=f.split('-');return d.padStart(2,'0')+'/'+m.padStart(2,'0')+'/'+y;}
  return f;
}
function sumNutri(rows){return rows.reduce((a,r)=>({kcal:a.kcal+r.kcal,proteina:a.proteina+r.proteina,carbos:a.carbos+r.carbos,grasas:a.grasas+r.grasas}),{kcal:0,proteina:0,carbos:0,grasas:0});}
function buildWeekNutri(allRows){
  const days=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const fecha=d.toLocaleDateString('es-AR',{year:'numeric',month:'2-digit',day:'2-digit'});const lbl=d.toLocaleDateString('es-AR',{weekday:'short'}).slice(0,2);const kcal=allRows.filter(r=>normalizeFecha(r.fecha)===fecha).reduce((s,r)=>s+r.kcal,0);days.push({lbl,kcal,isToday:i===0});}
  return days;
}
function renderNutriReal(container,allRows){
  const today=todayAR(),todayRows=allRows.filter(r=>normalizeFecha(r.fecha)===today),totals=sumNutri(todayRows),metas=NUTRI_CONFIG.metas,weekData=buildWeekNutri(allRows),maxKcal=Math.max(...weekData.map(d=>d.kcal),metas.kcal,100);
  const latestRow=[...allRows].reverse().find(r=>r.fase_ciclo||r.sueno_q||r.estres)||{};
  const fase=latestRow.fase_ciclo||'',sueno=todayRows.find(r=>r.sueno_q>0)?.sueno_q||latestRow.sueno_q||0;
  const estres=todayRows.find(r=>r.estres>0)?.estres||latestRow.estres||0;
  const fatiga=todayRows.find(r=>r.fatiga>0)?.fatiga||latestRow.fatiga||0;
  const vfc=todayRows.find(r=>r.vfc>0)?.vfc||latestRow.vfc||0;
  const notas=todayRows.find(r=>r.notas)?.notas||'';
  const R=40,circ=2*Math.PI*R,pct=Math.min(totals.kcal/metas.kcal,1),color=totals.kcal>metas.kcal?'#e05050':'#b87040',arcOffset=circ-pct*circ;
  const faseMap={menstruacion:{cls:'mens',label:'Menstruación'},folicular:{cls:'foli',label:'Folicular'},ovulacion:{cls:'ovu',label:'Ovulación'},lutea:{cls:'lute',label:'Lútea'}};
  const faseInfo=faseMap[fase?.toLowerCase()]||null;
  const logRows=todayRows.filter(r=>r.kcal>0||r.desayuno||r.almuerzo||r.cena);
  container.innerHTML=`<div class="nutri-real"><div class="nr-header"><div class="nr-title">registro de <em>hoy</em> · ${new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</div><div class="nr-sync" onclick="reloadNutri()"><div class="nr-dot"></div> sincronizar bot</div></div><div class="nr-body"><div class="nr-ring-row"><div class="nr-ring"><svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="${R}" fill="none" stroke="var(--surface2)" stroke-width="8"/><circle id="nr-arc" cx="50" cy="50" r="${R}" fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${circ.toFixed(1)}" style="transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)"/></svg><div class="nr-ring-center"><div class="nr-kcal" id="nr-kcal-count">0</div><div class="nr-kcal-lbl">kcal</div></div></div><div class="nr-cal-meta"><div class="nr-cal-row"><span class="nr-cal-key">Meta diaria</span><span class="nr-cal-val neu">${metas.kcal} kcal</span></div><div class="nr-cal-row"><span class="nr-cal-key">Consumidas</span><span class="nr-cal-val">${Math.round(totals.kcal)} kcal</span></div><div class="nr-cal-row"><span class="nr-cal-key">Restantes</span><span class="nr-cal-val ${metas.kcal-totals.kcal>=0?'pos':'neg'}">${Math.round(Math.abs(metas.kcal-totals.kcal))} kcal ${metas.kcal-totals.kcal>=0?'↓':'sobre'}</span></div></div></div><div class="nr-macros">${[{k:'proteina',label:'Proteína',meta:metas.proteina,val:totals.proteina,color:'#6a9aba'},{k:'carbos',label:'Carbos',meta:metas.carbos,val:totals.carbos,color:'#b87040'},{k:'grasas',label:'Grasas',meta:metas.grasas,val:totals.grasas,color:'#e8845a'}].map(m=>`<div class="nr-macro"><div class="nr-macro-lbl">${m.label}</div><div class="nr-macro-val">${Math.round(m.val)}<span style="font-size:.65rem;color:var(--muted)">g</span></div><div class="nr-macro-sub">/ ${m.meta}g</div><div class="nr-bar"><div class="nr-bar-fill" data-pct="${Math.min(m.val/m.meta*100,100).toFixed(0)}" style="width:0%;background:${m.color}"></div></div></div>`).join('')}</div><div class="nr-wellness">${sueno>0?`<span class="nr-chip sueno">😴 Sueño ${sueno}/10</span>`:''} ${vfc>0?`<span class="nr-chip agua">💗 VFC ${vfc}</span>`:''} ${estres>0?`<span class="nr-chip ${estres>6?'rosa':'energia'}">⚡ Estrés ${estres}/10</span>`:''} ${fatiga>0?`<span class="nr-chip ${fatiga>6?'rosa':'sueno'}">🔋 Fatiga ${fatiga}/10</span>`:''} ${faseInfo?`<span class="nr-chip ciclo ${faseInfo.cls}">🌿 ${faseInfo.label}</span>`:''} ${notas?`<div style="margin-top:.5rem;font-size:.74rem;color:var(--text2);line-height:1.55;font-style:italic">📝 ${notas}</div>`:''}</div><div class="lbl" style="margin-bottom:.5rem">últimos 7 días · kcal</div><div class="nr-week">${weekData.map(d=>`<div class="nr-week-col"><div class="nr-week-bar ${d.isToday?'today':d.kcal>metas.kcal?'over':'past'}" data-h="${d.kcal>0?(d.kcal/maxKcal*100).toFixed(0):0}" style="height:2px"></div><div class="nr-week-lbl ${d.isToday?'today':''}">${d.lbl}</div></div>`).join('')}</div>${(()=>{
  const meals=[
    {key:'desayuno',label:'Desayuno',val:todayRows[0]?.desayuno||''},
    {key:'almuerzo',label:'Almuerzo',val:todayRows[0]?.almuerzo||''},
    {key:'merienda',label:'Merienda',val:todayRows[0]?.merienda||''},
    {key:'cena',label:'Cena',val:todayRows[0]?.cena||''},
    {key:'pre_entreno',label:'Pre entreno',val:todayRows[0]?.pre_entreno||''},
  ].filter(m=>m.val);
  if(!meals.length&&!totals.kcal) return `<div class="nr-empty">Todavía nada registrado hoy.<br><span style="font-size:.72rem">Completá tu planilla de Google Sheets 📋</span></div>`;
  return `<div class="lbl" style="margin:1rem 0 .5rem">comidas del día</div><div class="nr-log">${meals.map(m=>`<div class="nr-log-item"><span class="nr-log-tag tag-${m.key}">${m.label}</span><span class="nr-log-name">${m.val}</span></div>`).join('')}${totals.kcal>0?`<div class="nr-log-item" style="border-top:1px solid var(--border);margin-top:.3rem;padding-top:.5rem"><span class="nr-log-tag tag-total">Totales</span><span class="nr-log-kcal">${Math.round(totals.kcal)} kcal</span><span class="nr-log-macros">P:${Math.round(totals.proteina)}g C:${Math.round(totals.carbos)}g G:${Math.round(totals.grasas)}g</span></div>`:''}</div>`;
})()}</div></div>`;
  requestAnimationFrame(()=>{
    const arc=document.getElementById('nr-arc');if(arc)arc.style.strokeDashoffset=arcOffset.toFixed(1);
    const kcalEl=document.getElementById('nr-kcal-count');if(kcalEl){const target=Math.round(totals.kcal);let cur=0,step=Math.max(1,Math.round(target/40));const t=setInterval(()=>{cur=Math.min(cur+step,target);kcalEl.textContent=cur;if(cur>=target)clearInterval(t);},25);}
    document.querySelectorAll('.nr-bar-fill[data-pct]').forEach(el=>el.style.width=el.dataset.pct+'%');
    document.querySelectorAll('.nr-week-bar[data-h]').forEach(el=>el.style.height=el.dataset.h+'%');
  });
}
window.reloadNutri=async function(){
  _nutriCache.rows=null;
  const wrap=document.getElementById('nr-real-wrap');
  if(wrap)wrap.innerHTML='<div class="nr-loading"><div class="nr-loading-dot"></div><div class="nr-loading-dot"></div><div class="nr-loading-dot"></div></div>';
  try{const rows=await fetchNutritionRows(true);if(wrap)renderNutriReal(wrap,rows);}
  catch(e){if(wrap)wrap.innerHTML=`<div class="nr-error">Error: ${e.message}</div>`;}
};

// ══════════════════════════════════════════════════
//  CYCLE DATA
// ══════════════════════════════════════════════════
const CYCLE_LEN=23;

function startOAuth(){
  const cs=document.getElementById('cs').value.trim();
  if(!cs){alert('Ingresá tu Client Secret de Strava.');return;}
  const cid='211490';
  sessionStorage.setItem('cd_cid',cid);
  sessionStorage.setItem('cd_cs',cs);
  location.href='https://www.strava.com/oauth/authorize?client_id='+cid+'&redirect_uri='+encodeURIComponent(REDIRECT)+'&response_type=code&scope=read,activity:read_all,profile:read_all&approval_prompt=auto';
}
async function handleCallback(){
  const p=new URLSearchParams(location.search),code=p.get('code');
  if(!code)return false;
  history.replaceState({},'','');
  const cid=sessionStorage.getItem('cd_cid'),cs=sessionStorage.getItem('cd_cs');
  if(!cid||!cs){showAuth();return true;}
  showLoad('Obteniendo acceso…');
  const r=await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:cid,client_secret:cs,code,grant_type:'authorization_code'})});
  const d=await r.json();
  if(d.access_token){sessionStorage.setItem('cd_token',d.access_token);sessionStorage.setItem('cd_athlete',JSON.stringify(d.athlete));await boot(d.access_token,d.athlete);}
  else{alert('Error: '+(d.message||'Token inválido'));showAuth();}
  return true;
}
function showAuth(){document.getElementById('auth-screen').style.display='';document.getElementById('loading-screen').style.display='none';document.getElementById('app').style.display='none';}
function showLoad(m){document.getElementById('auth-screen').style.display='none';document.getElementById('loading-screen').style.display='flex';document.getElementById('load-msg').textContent=m||'Cargando…';document.getElementById('app').style.display='none';}
function logout(){sessionStorage.clear();showAuth();}
const api=async ep=>{const r=await fetch('https://www.strava.com/api/v3'+ep,{headers:{Authorization:'Bearer '+S.token}});if(!r.ok)throw new Error(r.status);return r.json();};

//  BOOT
// ══════════════════════════════════════════════════
async function boot(token,athlete){
  S.token=token;S.athlete=athlete;
  const prof=JSON.parse(localStorage.getItem('carol_profile')||'{}');
  S.age=prof.age||30;S.fcmax=prof.fcmax||(220-S.age);S.weight=prof.peso||prof.weight||58;S.cycle=prof.cycle||'ovulacion';
  try{const j=localStorage.getItem('carol_journal');if(j)JOURNAL=JSON.parse(j);}catch(e){}
  showLoad('Cargando actividades…');
  let acts=[];
  try{for(let pg=1;pg<=3;pg++){showLoad('Cargando actividades ('+pg+'/3)…');const b=await api('/athlete/activities?per_page=100&page='+pg);acts=[...acts,...b];if(b.length<100)break;}}catch(e){}
  S.activities=acts.sort((a,b)=>new Date(b.start_date)-new Date(a.start_date));
  const phaseName={menstruacion:'🌑 Menstruación',folicular:'🌱 Folicular',ovulacion:'🌕 Ovulación',lutea:'🌘 Lútea'}[S.cycle]||'';
  document.getElementById('h-phase').textContent=phaseName;
  document.getElementById('h-avatar').src=athlete.profile_medium||'';
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='block';
  builtTabs.clear();builtTabs.add('inicio');
  buildInicio();
}

const fmtDist=m=>m>=1000?(m/1000).toFixed(1)+' km':Math.round(m)+'m';
const fmtDur=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?h+'h '+m+'m':m+'m';};
const fmtDate=d=>{try{return new Date(d).toLocaleDateString('es-AR',{day:'2-digit',month:'short'})}catch{return d}};
const fmtDateFull=d=>{try{return new Date(d).toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'long'})}catch{return d}};
const mean=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0;
const actIcon=t=>({Run:'🏃',Ride:'🚴',Swim:'🏊',Walk:'🚶',Hike:'🥾',WeightTraining:'💪',VirtualRide:'🚴',TrailRun:'⛰️',Yoga:'🧘',Crossfit:'🏋️',Workout:'🏋️'}[t]||'⚡');
const actCol=t=>(['Run','TrailRun'].includes(t)?'var(--terra)':['Ride','VirtualRide'].includes(t)?'var(--sky)':['WeightTraining','Crossfit','Workout'].includes(t)?'var(--lut)':'var(--sage)');
function getZone(hr){const p=hr/S.fcmax*100;return p<60?1:p<70?2:p<80?3:p<90?4:5;}
const zLbl=['','Z1 Recuperación','Z2 Quema grasa','Z3 Aeróbico','Z4 Umbral','Z5 Máximo'];
const zBadge=['','bk','bs','bd','bt','br'];
function calcLoad(a){const d=(a.moving_time||0)/3600,hr=a.average_heartrate||0;if(hr>0){const r=hr/S.fcmax;return Math.round(d*60*r*Math.exp(1.92*r));}const km=(a.distance||0)/1000;if(['Run','TrailRun'].includes(a.type))return Math.round(d*50+km*3);if(['Ride','VirtualRide'].includes(a.type))return Math.round(d*35+km);return Math.round(d*40);}
function computeCtlAtl(){
  const sorted=[...S.activities].sort((a,b)=>new Date(a.start_date)-new Date(b.start_date));
  if(!sorted.length)return[];
  const first=new Date(sorted[0].start_date),days=Math.ceil((new Date()-first)/86400000)+1;
  const daily={};sorted.forEach(a=>{const k=a.start_date.slice(0,10);daily[k]=(daily[k]||0)+calcLoad(a);});
  const kC=2/43,kA=2/8;let ctl=0,atl=0;const res=[];
  for(let i=0;i<days;i++){const d=new Date(first);d.setDate(d.getDate()+i);const k=d.toISOString().slice(0,10);const load=daily[k]||0;ctl=ctl*(1-kC)+load*kC;atl=atl*(1-kA)+load*kA;res.push({date:k,load,ctl:Math.round(ctl),atl:Math.round(atl),tsb:Math.round(ctl-atl)});}
  return res;
}
let CI={};
function dC(id){if(CI[id]){CI[id].destroy();delete CI[id];}}
function mC(id,cfg){dC(id);const ctx=document.getElementById(id);if(!ctx)return;CI[id]=new Chart(ctx,cfg);}
function cOpts(leg=true){
  return{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:leg,labels:{font:{family:'DM Sans',size:11},color:'var(--muted)',boxWidth:10,padding:10}}},scales:{x:{grid:{display:false},ticks:{font:{family:'DM Sans',size:13},color:'var(--text2)',maxTicksLimit:8}},y:{grid:{color:'var(--border)'},ticks:{font:{family:'DM Sans',size:12},color:'var(--text2)'}}}};}
function getFiltered(){
  const f=S.filter;let acts=S.activities;
  if(f.type!=='all'){if(f.type==='running')acts=acts.filter(a=>['Run','TrailRun'].includes(a.type));else if(f.type==='cycling')acts=acts.filter(a=>['Ride','VirtualRide'].includes(a.type));else if(f.type==='gym')acts=acts.filter(a=>['WeightTraining','Crossfit','Workout'].includes(a.type));}
  const now=new Date();
  if(f.period==='week')acts=acts.filter(a=>new Date(a.start_date)>=new Date(now-7*864e5));
  else if(f.period==='month')acts=acts.filter(a=>new Date(a.start_date)>=new Date(now.getFullYear(),now.getMonth(),1));
  else if(f.period==='3months')acts=acts.filter(a=>new Date(a.start_date)>=new Date(now-90*864e5));
  else if(f.period==='year')acts=acts.filter(a=>new Date(a.start_date)>=new Date(now.getFullYear(),0,1));
  else if(f.period==='custom'&&f.month)acts=acts.filter(a=>a.start_date.startsWith(f.month));
  return acts;
}
function filterBar(id,tabName,showType=true){
  const f=S.filter;
  const months=[...new Set(S.activities.map(a=>a.start_date.slice(0,7)))].sort().reverse().slice(0,12);
  const fmtM=m=>{const[y,mo]=m.split('-');return new Date(y,mo-1).toLocaleString('es-AR',{month:'short',year:'2-digit'});};
  return '<div class="filter-bar">'
    +'<span class="flbl">Período</span>'
    +[['week','Esta semana'],['month','Este mes'],['3months','3 meses'],['year','Este año'],['all','Todo']].map(([v,l])=>'<button class="fchip'+(f.period===v?' active':'')+'" onclick="sf(\'period\',\''+v+'\',\''+tabName+'\')">'+l+'</button>').join('')
    +'<div class="fsep"></div>'
    +'<select class="fsel" onchange="sf(\'period\',\'custom\',\''+tabName+'\',this.value)"><option value="">Mes…</option>'+months.map(m=>'<option value="'+m+'"'+(f.period==='custom'&&f.month===m?' selected':'')+'>'+fmtM(m)+'</option>').join('')+'</select>'
    +(showType?'<div class="fsep"></div><span class="flbl">Deporte</span>'+[['all','Todos'],['running','Running'],['cycling','Ciclismo'],['gym','Gym']].map(([v,l])=>'<button class="fchip'+(f.type===v?' active':'')+'" onclick="sf(\'type\',\''+v+'\',\''+tabName+'\')">'+l+'</button>').join(''):'')
    +'</div>';
}
window.sf=function(key,val,tabName,extra){
  if(key==='period'&&val==='custom'){S.filter.period='custom';S.filter.month=extra||S.filter.month;}
  else S.filter[key]=val;
  builtTabs.delete(tabName);
  const builders={inicio:buildInicio,forma:buildForma,nutricion:buildNutricion,reporte:buildReporte,perfil:buildPerfil};
  if(builders[tabName]){builders[tabName]();builtTabs.add(tabName);}
};
function actList(acts){
  if(!acts.length)return '<div class="empty">Sin actividades para este filtro.</div>';
  return '<div class="act-list">'+acts.map(a=>{
    const z=a.average_heartrate?getZone(a.average_heartrate):0;
    const pace=a.average_speed&&['Run','TrailRun'].includes(a.type)?(s=>Math.floor(s/60)+':'+String(Math.round(s%60)).padStart(2,'0')+'/km')(1000/a.average_speed):a.average_speed&&['Ride','VirtualRide'].includes(a.type)?(a.average_speed*3.6).toFixed(1)+' km/h':'—';
    return '<div class="act-row"><div class="act-icon" style="background:'+actCol(a.type)+'20">'+actIcon(a.type)+'</div><div><div class="act-name">'+a.name+'</div><div class="act-meta">'+fmtDateFull(a.start_date_local)+(z?' · <span class="badge '+zBadge[z]+'">'+zLbl[z]+'</span>':'')+'</div></div><div class="astat"><div class="av">'+fmtDist(a.distance)+'</div><div class="al">dist</div></div><div class="astat"><div class="av">'+fmtDur(a.moving_time)+'</div><div class="al">duración</div></div><div class="astat"><div class="av">'+(a.average_heartrate?Math.round(a.average_heartrate)+' bpm':pace)+'</div><div class="al">'+(a.average_heartrate?'fc prom':'ritmo')+'</div></div><div class="astat"><div class="av">'+(a.total_elevation_gain?Math.round(a.total_elevation_gain)+'m':'—')+'</div><div class="al">desnivel</div></div></div>';
  }).join('')+'</div>';
}

function buildInicio(){
  const el=document.getElementById('tab-inicio');
  const acts=getFiltered();
  const tD=acts.reduce((s,a)=>s+(a.distance||0),0),tT=acts.reduce((s,a)=>s+(a.moving_time||0),0);
  const wHR=acts.filter(a=>a.average_heartrate>0),avgHR=wHR.length?Math.round(mean(wHR.map(a=>a.average_heartrate))):0;
  const zD=[0,0,0,0,0,0];wHR.forEach(a=>{zD[getZone(a.average_heartrate)]+=a.moving_time||0;});
  const tot=zD.reduce((s,v)=>s+v,0),z2p=tot?Math.round(zD[2]/tot*100):0;
  const fatP=tot?Math.round(wHR.reduce((s,a)=>{const z=getZone(a.average_heartrate);return s+(a.moving_time||0)*[0,.95,.85,.50,.25,.05][z];},0)/tot*100):0;
  const zClrArr=['var(--z1c)','var(--z2c)','var(--z3c)','var(--z4c)','var(--z5c)'];
  const zones=[{z:1,l:'Recuperación',f:'95%'},{z:2,l:'Quema de grasa',f:'85%'},{z:3,l:'Aeróbico',f:'50%'},{z:4,l:'Umbral',f:'25%'},{z:5,l:'Máximo',f:'5%'}];
  const czId='cz-'+Date.now();
  const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  if(!S.dayFilter)S.dayFilter=[];
  const filteredByDay=S.dayFilter.length?acts.filter(a=>S.dayFilter.includes(new Date(a.start_date).getDay())):acts;

  el.innerHTML=filterBar('fb-i','inicio',true)
    +'<div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem">'
    +'<span class="flbl">Día</span>'
    +DAYS.map((d,i)=>'<button class="fchip'+(S.dayFilter.includes(i)?' active':'')+'" onclick="toggleDay('+i+')">'+d+'</button>').join('')
    +(S.dayFilter.length?'<button class="fchip" onclick="S.dayFilter=[];builtTabs.delete(\'inicio\');buildInicio();" style="opacity:.6">✕ Limpiar</button>':'')
    +'</div>'

function buildCycleCombo(cycle,tsb){
  const tsbOk=tsb>5&&tsb<30;
  if(cycle==='ovulacion'&&tsbOk)return '🏆 Máximo rendimiento — todo alineado';
  if(cycle==='folicular'&&tsbOk)return '💪 Ventana anabólica + forma óptima';
  if(cycle==='lutea'&&tsb>-10)return '🔥 Cardio Z2 = quema de grasa máxima';
  if(cycle==='menstruacion')return '🧘 Movimiento suave y recuperación';
  return 'Ajustá la intensidad según cómo te sentís';
}
function buildForma(){
  const el=document.getElementById('tab-forma'),series=computeCtlAtl(),l60=series.slice(-60);
  const td=series[series.length-1]||{ctl:0,atl:0,tsb:0},wk=series[series.length-8]||{ctl:0,atl:0,tsb:0};
  const st=td.tsb>10?{l:'Forma óptima ✦',c:'var(--sage)',msg:'Estás descansada y lista para dar el máximo.'}:td.tsb>-10?{l:'Forma neutra',c:'var(--dusk)',msg:'Balance entre carga y recuperación.'}:td.tsb>-30?{l:'Carga alta',c:'var(--terra)',msg:'Bajá el volumen y priorizá sueño.'}:{l:'Sobreentrenamiento',c:'var(--rose)',msg:'Necesitás 3-5 días de descanso activo.'};
  const c1='cf1-'+Date.now(),c2='cf2-'+Date.now();
  const cycleEmojis={menstruacion:'🌑',folicular:'🌱',ovulacion:'🌕',lutea:'🌘'};
  const cycleNames={menstruacion:'Menstruación',folicular:'Folicular',ovulacion:'Ovulación',lutea:'Lútea'};
  const cycleDaysMap={menstruacion:'Días 1–5',folicular:'Días 6–12',ovulacion:'Días 13–16',lutea:'Días 17–28'};
  const cycleColors={menstruacion:'var(--men)',folicular:'var(--fol)',ovulacion:'var(--ovu)',lutea:'var(--lut)'};
  const cc=cycleColors[S.cycle]||'var(--ovu)',ce=cycleEmojis[S.cycle]||'🌕',cn=cycleNames[S.cycle]||'Ovulación',cd=cycleDaysMap[S.cycle]||'Días 13–16';
  const combo=buildCycleCombo(S.cycle,td.tsb);

  el.innerHTML='<div class="sec">estado hoy</div>'
    +'<div class="grid g4">'
    +'<div class="card"><div class="card-accent ca-sky"></div><div class="lbl">Fitness (CTL)</div><div class="big">'+td.ctl+'</div><div class="sub">'+(td.ctl>=wk.ctl?'↑':'↓')+' '+Math.abs(td.ctl-wk.ctl)+' vs semana pasada</div></div>'
    +'<div class="card"><div class="card-accent ca-terra"></div><div class="lbl">Fatiga (ATL)</div><div class="big">'+td.atl+'</div><div class="sub">'+(td.atl>wk.atl?'↑ Más cargada':'↓ Recuperando')+'</div></div>'
    +'<div class="card"><div class="card-accent" style="background:'+st.c+'"></div><div class="lbl">Forma (TSB)</div><div class="big" style="color:'+st.c+'">'+(td.tsb>0?'+':'')+td.tsb+'</div><div style="margin-top:.35rem;font-size:.72rem;color:'+st.c+';font-weight:500">'+st.l+'</div></div>'
    +'<div class="card"><div class="lbl">Carga 7 días</div><div class="big xs">'+series.slice(-7).reduce((s,d)=>s+d.load,0)+'<span class="unit">TRIMP</span></div><div class="sub">vs '+series.slice(-14,-7).reduce((s,d)=>s+d.load,0)+' sem. ant.</div></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-top:.85rem">'
    +'<div class="insight" style="border-left-color:'+st.c+';margin:0"><div class="it">'+st.l+'</div><div class="ib">'+st.msg+'</div></div>'
    +'<div class="card" style="display:flex;align-items:center;gap:.85rem;padding:.85rem 1rem">'
    +'<span style="font-size:2rem">'+ce+'</span>'
    +'<div><div style="font-size:.62rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:'+cc+';margin-bottom:.2rem">'+cd+'</div>'
    +'<div style="font-size:1rem;font-weight:400;color:var(--text)">'+cn+'</div>'
    +'<div style="font-size:.72rem;color:var(--muted);margin-top:.2rem">'+combo+'</div></div>'
    +'</div>'
    +'</div>'
    +'<div class="sec">evolución 60 días</div>'
    +'<div class="chart-card"><div class="ct">Fitness vs Fatiga</div><div class="cs">CTL (azul) sube lento. ATL (naranja) fluctúa con cada entrenamiento.</div><div class="cwrap tall"><canvas id="'+c1+'"></canvas></div></div>'
    +'<div class="chart-card" style="margin-top:.85rem"><div class="ct">Forma deportiva (TSB)</div><div class="cwrap"><canvas id="'+c2+'"></canvas></div></div>';

  setTimeout(()=>{
    const lbl=l60.map(d=>fmtDate(d.date));

    // Build cycle phase as a background dataset using bar chart layered behind
    // We use a Chart.js plugin to draw colored background zones per phase
    const cycleZoneColors={menstruacion:'rgba(224,80,80,.18)',folicular:'rgba(90,138,80,.18)',ovulacion:'rgba(208,112,48,.18)',lutea:'rgba(122,90,170,.18)'};
    const cycleLabels={menstruacion:'Mens.',folicular:'Fol.',ovulacion:'Ovu.',lutea:'Lutea'};

    // Build per-day cycle phase data based on today's cycle + 60 days back
    // We don't have historical cycle data, so we approximate based on current phase
    // by cycling backwards from today
    const todayIdx = l60.length - 1;
    const CLEN = 23;
    const phaseOrder = ['menstruacion','folicular','ovulacion','lutea'];
    const phaseLens = {menstruacion:5, folicular:7, ovulacion:4, lutea:7};
    // Find current day in cycle
    const cycleStartDay = {menstruacion:1,folicular:6,ovulacion:13,lutea:17};
    const currentCycleDay = cycleStartDay[S.cycle] || 13;

    // Build cycle day for each of the 60 days
    function getPhaseForCycleDay(cd){
      const d = ((cd-1) % CLEN) + 1;
      if(d<=5)return'menstruacion';if(d<=12)return'folicular';if(d<=16)return'ovulacion';return'lutea';
    }
    const cycleDays = l60.map((_,i)=>{
      const offset = todayIdx - i;
      const cd = ((currentCycleDay - 1 - offset) % CLEN + CLEN) % CLEN + 1;
      return getPhaseForCycleDay(cd);
    });

    // Create background color annotation plugin
    const cyclePlugin = {
      id: 'cycleBackground',
      beforeDraw(chart) {
        const {ctx, chartArea, scales} = chart;
        if(!chartArea) return;
        const xScale = scales.x;
        ctx.save();
        cycleDays.forEach((phase, i) => {
          const x0 = xScale.getPixelForValue(i) - (i>0?(xScale.getPixelForValue(i)-xScale.getPixelForValue(i-1))/2:0);
          const x1 = xScale.getPixelForValue(i) + (i<cycleDays.length-1?(xScale.getPixelForValue(i+1)-xScale.getPixelForValue(i))/2:0);
          ctx.fillStyle = cycleZoneColors[phase] || 'transparent';
          ctx.fillRect(x0, chartArea.top, x1-x0, chartArea.height);
        });
        ctx.restore();
      }
    };

    // Find phase transition points to draw labels
    const phaseTransitions = [];
    let lastPhase = null;
    cycleDays.forEach((phase, i) => {
      if(phase !== lastPhase) {
        phaseTransitions.push({phase, idx: i});
        lastPhase = phase;
      }
    });

    const labelPlugin = {
      id: 'cycleLabels',
      afterDraw(chart) {
        const {ctx, chartArea, scales} = chart;
        if(!chartArea) return;
        const phaseEmojis = {menstruacion:'🌑',folicular:'🌱',ovulacion:'🌕',lutea:'🌘'};
        ctx.save();
        ctx.font = '10px DM Sans';
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.textAlign = 'center';
        phaseTransitions.forEach((t, ti) => {
          const nextIdx = ti < phaseTransitions.length-1 ? phaseTransitions[ti+1].idx : cycleDays.length-1;
          const midIdx = Math.round((t.idx + nextIdx) / 2);
          const x = scales.x.getPixelForValue(midIdx);
          ctx.fillText(phaseEmojis[t.phase] || '', x, chartArea.top + 14);
        });
        ctx.restore();
      }
    };

    const opts1 = {
      ...cOpts(),
      plugins: {
        ...cOpts().plugins,
        cycleBackground: true,
        cycleLabels: true,
      }
    };

    mC(c1,{type:'line',plugins:[cyclePlugin,labelPlugin],data:{labels:lbl,datasets:[{label:'Fitness (CTL)',data:l60.map(d=>d.ctl),borderColor:'var(--sky)',backgroundColor:'rgba(74,106,138,.12)',borderWidth:2,pointRadius:0,fill:true,tension:.3},{label:'Fatiga (ATL)',data:l60.map(d=>d.atl),borderColor:'var(--terra)',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:.3,borderDash:[4,3]}]},options:opts1});
    mC(c2,{type:'bar',plugins:[cyclePlugin,labelPlugin],data:{labels:lbl,datasets:[{label:'Forma (TSB)',data:l60.map(d=>d.tsb),backgroundColor:l60.map(d=>d.tsb>=0?'rgba(90,122,74,.7)':'rgba(196,80,106,.7)'),borderRadius:2}]},options:{...cOpts(false)}});
  },80);
}

  const inp=document.getElementById('chat-input'),btn=document.getElementById('chat-snd'),text=inp.value.trim();if(!text)return;
  let geminiKey=localStorage.getItem('carol_gemini_key');

  addMsg(text,'user');inp.value='';btn.disabled=true;
  const typing=document.createElement('div');typing.className='typing';typing.style.display='flex';typing.innerHTML='<span></span><span></span><span></span>';

  if(picker.style.display==='none'){
    const phases=[['menstruacion','🌑 Menstruación','Días 1–5'],['folicular','🌱 Folicular','Días 6–12'],['ovulacion','🌕 Ovulación','Días 13–16'],['lutea','🌘 Lútea','Días 17–28']];
    picker.innerHTML=phases.map(([v,l,d])=>'<div onclick="setCycle(\'' +v+ '\')" style="padding:.45rem .75rem;border-radius:7px;cursor:pointer;font-size:.78rem;color:var(--text2);display:flex;justify-content:space-between;align-items:center;gap:.75rem" onmouseover="this.style.background=\'var(--surface2)\'" onmouseout="this.style.background=\'\'">'+'<span>'+l+'</span><span style="font-size:.62rem;color:var(--muted)">'+d+'</span></div>').join('');
    picker.innerHTML='<div style="font-size:.6rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.3rem .5rem .5rem">Cambiar fase del ciclo</div>'+picker.innerHTML;
    picker.style.display='block';
    setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),100);
  } else picker.style.display='none';
};
function closePicker(e){const p=document.getElementById('cycle-picker');if(p&&!p.contains(e.target))p.style.display='none';}
window.setCycle=function(cycle){
  S.cycle=cycle;
  const prof=JSON.parse(localStorage.getItem('carol_profile')||'{}');
  prof.cycle=cycle;
  localStorage.setItem('carol_profile',JSON.stringify(prof));
  const phaseName={menstruacion:'🌑 Menstruación',folicular:'🌱 Folicular',ovulacion:'🌕 Ovulación',lutea:'🌘 Lútea'}[cycle]||'';
  document.getElementById('h-phase').textContent=phaseName;
  document.getElementById('cycle-picker').style.display='none';
  ['inicio','forma','nutricion','reporte'].forEach(t=>builtTabs.delete(t));
  const active=document.querySelector('.tab.active');
  const activeName=active?active.getAttribute('onclick').match(/'(\w+)'/)?.[1]:'inicio';
  const builders={inicio:buildInicio,forma:buildForma,nutricion:buildNutricion,reporte:buildReporte};
  if(builders[activeName]){builders[activeName]();builtTabs.add(activeName);}
};

const tabBuilders={inicio:buildInicio,forma:buildForma,nutricion:buildNutricion,reporte:buildReporte,perfil:buildPerfil};
const builtTabs=new Set();
function showTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(!builtTabs.has(name)&&tabBuilders[name]){
    const result=tabBuilders[name]();
    if(result&&typeof result.then==='function')result.catch(e=>console.error('Tab error:',e));
    builtTabs.add(name);
  }
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
(async()=>{
  const handled=await handleCallback();
  if(!handled){const token=sessionStorage.getItem('cd_token'),ath=sessionStorage.getItem('cd_athlete');if(token&&ath)await boot(token,JSON.parse(ath));else showAuth();}
})();
</script>
